<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI GIF Maker MVP</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body data-server-save-enabled="{{ '1' if download_to_server_enabled else '0' }}">
  <main class="page">
    <section class="hero">
      <div class="badge">MVP</div>
      <h1>м§§мқҖ л¬ёмһҘмңјлЎң<br />3мҙҲ GIF л§Ңл“Өкё°</h1>
      <p>нҳ„мһ¬ н…ҢмҠӨнҠё лІ„м „мқҖ мҳҒм–ҙ н”„лЎ¬н”„нҠёл§Ң мһ…л Ҙн•ҙм„ң л¬ҙлЈҢ мқҙлҜём§Җ APIлЎң GIFлҘј мғқм„ұн•©лӢҲлӢӨ.</p>
    </section>

    <section class="workspace">
      <form class="panel controls" id="generateForm">
        <label for="prompt">English prompt</label>
        <textarea id="prompt" name="prompt" maxlength="600" placeholder="Example: pink cherry blossom petals blowing in the wind, clean composition, high quality" required></textarea>

        <div class="field-grid">
          <div>
            <label for="style">мҠӨнғҖмқј</label>
            <select id="style" name="style">
              {% for key, item in styles.items() %}
                <option value="{{ key }}">{{ item.label }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label for="ratio">л№„мңЁ</label>
            <select id="ratio" name="ratio">
              {% for key, label in ratios.items() %}
                <option value="{{ key }}" {% if key == default_ratio %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <button id="generateBtn" type="submit">GIF мғқм„ұ</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>

      <section class="panel preview" aria-live="polite">
        <div class="preview-empty" id="emptyState">мғқм„ұ кІ°кіјк°Җ м—¬кё°м—җ н‘ңмӢңлҗ©лӢҲлӢӨ.</div>
        <img id="gifPreview" class="hidden" alt="мғқм„ұлҗң GIF лҜёлҰ¬ліҙкё°" />
        <a id="directDownloadLink" class="download hidden" href="#" download>GIF лӢӨмҡҙлЎңл“ң</a>
        <button id="saveBtn" class="secondary-button hidden" type="button">м„ңлІ„ нҸҙлҚ”м—җ м ҖмһҘ</button>
        <p id="savePath" class="save-path hidden"></p>
        <dl class="metadata hidden" id="metadata">
          <div>
            <dt>кёёмқҙ</dt>
            <dd id="durationMeta">-</dd>
          </div>
          <div>
            <dt>н”„л Ҳмһ„</dt>
            <dd id="frameMeta">-</dd>
          </div>
          <div>
            <dt>мғқм„ұкё°</dt>
            <dd id="providerMeta">-</dd>
          </div>
        </dl>
      </section>
    </section>
  </main>
  <script src="/static/js/app.js?v=20260623-english-only"></script>
</body>
</html>
